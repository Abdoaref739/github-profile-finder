<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>github profile finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="page-header">
        <h1 class="header-main-text">github profile finder</h1>
    </header>
    <div class="middle-page-div">
        <span id="hook-sentence">Wanna steal a glance on someone's profile!</span>
        <div class="profiles-search-div">
            <div class="input-button-section">
            <input type="text" id="search-field">
            <button id="search-button">search!</button>
            </div>
            <div id="results-div">
                <div class="main-info-div">
                <img src="#" id="profile-avatar">
                <span id="github-username"></span>
                <span id="github-bio"></span>
                </div>
                <div class="more-info-div">
                    <div class="followers-div">
                    <span id="followers">No.of followes: 
                        <span id="followers-number"></span>
                    </span>
                    </div>
                    <div class="repos-date-div">
                    <span id="date-of-creation"></span>
                    <span id="repos-number"></span>
                    </div>
                    <div class="following-div">
                    <span id="following">No.of following: 
                        <span id="following-number"></span>
                    </span>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="page-footer">
        <span class="footer-text">Made by @aref - 2026 &copy;copyright all rights reserved</span>
    </footer>

    <script src="script.js"></script>
</body>
</html>
